name: CI/CD — Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Type Check
  # ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy (push via rsync — no server internet needed)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone mode)
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare deploy package
        run: |
          mkdir -p deploy_pkg
          cp -r .next/standalone/. deploy_pkg/
          cp -r .next/static deploy_pkg/.next/static
          mkdir -p deploy_pkg/public
          [ -d public ] && cp -r public/. deploy_pkg/public/ || true
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > deploy_pkg/.env.local
          cp ecosystem.config.cjs deploy_pkg/
          [ -f scripts/start.sh ] && cp scripts/start.sh deploy_pkg/start.sh && chmod +x deploy_pkg/start.sh || true
          echo "=== Deploy package contents ==="
          ls -la deploy_pkg/
          test -f deploy_pkg/server.js && echo "server.js OK" || { echo "ERROR: server.js missing"; exit 1; }

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure deploy dir exists on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p /home/${{ secrets.SERVER_USER }}/htdocs/cwprdgen.agentwhistle.cloud"

      - name: Deploy via tar+scp+ssh
        run: |
          tar czf deploy.tar.gz -C deploy_pkg .
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/deploy.tar.gz
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /home/${{ secrets.SERVER_USER }}/htdocs && rm -rf cwprdgen.agentwhistle.cloud.new && mkdir cwprdgen.agentwhistle.cloud.new && cd cwprdgen.agentwhistle.cloud.new && tar xzf /tmp/deploy.tar.gz && cd .. && rm -rf cwprdgen.agentwhistle.cloud && mv cwprdgen.agentwhistle.cloud.new cwprdgen.agentwhistle.cloud && rm /tmp/deploy.tar.gz"

      - name: Deploy with PM2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash << 'ENDSSH'
            DEPLOY_DIR="$HOME/htdocs/cwprdgen.agentwhistle.cloud"

            echo "=== Stopping old process ==="
            pkill -f "node server.js" 2>/dev/null || true
            sleep 2

            echo "=== Starting app with PM2 ==="
            cd "$DEPLOY_DIR" || { echo "ERROR: cd failed"; exit 1; }
            npx pm2 delete plancraft 2>/dev/null || true
            npx pm2 start ecosystem.config.cjs || { echo "ERROR: pm2 start failed"; exit 1; }

            echo "=== Saving PM2 process list ==="
            npx pm2 save

            echo "=== PM2 startup (run on boot) ==="
            npx pm2 startup 2>&1 || true

            echo "=== Health check ==="
            sleep 3
            curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:3000/api/health || echo "Health check skipped"
            npx pm2 list
          ENDSSH
