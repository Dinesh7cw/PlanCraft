name: CI/CD — Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Type Check
  # ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy (push via rsync — no server internet needed)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone mode)
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare deploy package
        run: |
          mkdir -p deploy_pkg
          cp -r .next/standalone/. deploy_pkg/
          cp -r .next/static deploy_pkg/.next/static
          cp -r public deploy_pkg/public
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > deploy_pkg/.env.local
          cp scripts/start.sh deploy_pkg/start.sh
          chmod +x deploy_pkg/start.sh

          echo "=== Standalone node_modules packages ==="
          ls deploy_pkg/node_modules/ | head -30

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          DEPLOY_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/cwprdgen.agentwhistle.cloud"
          rsync -avz --delete \
            --no-times \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy_pkg/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_DIR}/ || true

      - name: Start app + diagnostics
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash << 'ENDSSH'
            set -e
            DEPLOY_DIR="$HOME/htdocs/cwprdgen.agentwhistle.cloud"
            LOG="$HOME/plancraft.log"

            echo "=============================="
            echo "1. SYSTEM INFO"
            echo "=============================="
            echo "Node: $(node --version)"
            echo "User: $(whoami)"
            echo "Deploy dir: $DEPLOY_DIR"
            echo "Files in deploy dir:"
            ls -la "$DEPLOY_DIR" | head -20
            echo ""
            echo "node_modules in deploy dir:"
            ls "$DEPLOY_DIR/node_modules/" 2>/dev/null | head -20 || echo "NO node_modules"

            echo ""
            echo "=============================="
            echo "2. ENV CHECK"
            echo "=============================="
            if grep -q "OPENAI_API_KEY" "$DEPLOY_DIR/.env.local" 2>/dev/null; then
              echo ".env.local: API key PRESENT"
            else
              echo ".env.local: API key MISSING!"
            fi

            echo ""
            echo "=============================="
            echo "3. NGINX CONFIG"
            echo "=============================="
            NGINX_CONF="/etc/nginx/sites-enabled/cwprdgen.agentwhistle.cloud.conf"
            if [ -f "$NGINX_CONF" ]; then
              echo "nginx config found:"
              grep -E "proxy_pass|listen|server_name|try_files|root" "$NGINX_CONF" || echo "no matching lines"
            else
              echo "nginx conf NOT at $NGINX_CONF — searching..."
              find /etc/nginx -name "*cwprdgen*" 2>/dev/null || echo "not found"
              find /etc/nginx-cp -name "*cwprdgen*" 2>/dev/null || echo "not found in nginx-cp"
            fi

            echo ""
            echo "=============================="
            echo "4. KILL OLD + START SERVER"
            echo "=============================="
            bash "$DEPLOY_DIR/start.sh"

            echo ""
            echo "=============================="
            echo "5. PORT CHECK"
            echo "=============================="
            sleep 3
            ss -tlnp 2>/dev/null | grep 3000 || netstat -tlnp 2>/dev/null | grep 3000 || echo "port 3000 not listening!"

            echo ""
            echo "=============================="
            echo "6. HEALTH CHECK"
            echo "=============================="
            sleep 3
            HTTP_CODE=$(curl -s -o /tmp/health_resp.txt -w "%{http_code}" http://localhost:3000/api/health 2>/dev/null || echo "FAILED")
            echo "HTTP status: $HTTP_CODE"
            echo "Response body:"
            cat /tmp/health_resp.txt 2>/dev/null || echo "no response"

            echo ""
            echo "=============================="
            echo "7. APP LOG (last 40 lines)"
            echo "=============================="
            tail -40 "$LOG" 2>/dev/null || echo "no log file"
          ENDSSH
