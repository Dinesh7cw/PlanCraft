name: CI/CD — Build, Lint & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Type Check
  # ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to Server (only on push to master)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            DEPLOY_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/cwprdgen.agentwhistle.cloud"

            # Clone repo if not exists, else pull latest
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/Dinesh7cw/PlanCraft.git "$DEPLOY_DIR"
            else
              cd "$DEPLOY_DIR"
              git pull origin master
            fi

            cd "$DEPLOY_DIR"

            # Write .env.local from GitHub secret
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env.local

            # Install dependencies
            npm ci --omit=dev

            # Build Next.js
            npm run build

            # Start or restart with PM2 on port 3000
            if pm2 describe plancraft > /dev/null 2>&1; then
              pm2 restart plancraft
            else
              pm2 start npm --name "plancraft" -- start -- --port 3000
            fi

            # Save PM2 process list (survives server reboot)
            pm2 save

            echo "✅ Deploy complete — running on port 3000"
