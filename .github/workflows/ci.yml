name: CI/CD — Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Type Check
  # ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy (push via rsync — no server internet needed)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone mode)
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare deploy package
        run: |
          mkdir -p deploy_pkg
          cp -r .next/standalone/. deploy_pkg/
          cp -r .next/static deploy_pkg/.next/static
          mkdir -p deploy_pkg/public
          [ -d public ] && cp -r public/. deploy_pkg/public/ || true
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > deploy_pkg/.env.local
          cp ecosystem.config.cjs deploy_pkg/
          [ -f scripts/start.sh ] && cp scripts/start.sh deploy_pkg/start.sh && chmod +x deploy_pkg/start.sh || true

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          DEPLOY_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/cwprdgen.agentwhistle.cloud"
          rsync -avz --delete \
            --no-times \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy_pkg/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_DIR}/ || true

      - name: Deploy with PM2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash << 'ENDSSH'
            set -e
            DEPLOY_DIR="$HOME/htdocs/cwprdgen.agentwhistle.cloud"

            echo "=== Stopping old process (nohup/previous) ==="
            pkill -f "node server.js" 2>/dev/null || true
            sleep 2

            echo "=== Starting app with PM2 (npx, no global install) ==="
            cd "$DEPLOY_DIR"
            npx pm2 delete plancraft 2>/dev/null || true
            npx pm2 start ecosystem.config.cjs

            echo "=== Saving PM2 process list ==="
            npx pm2 save

            echo "=== PM2 startup (run on boot) ==="
            npx pm2 startup 2>&1 || true
            echo "If you see a sudo command above, run it once on the server to enable PM2 on reboot."

            echo "=== Health check ==="
            sleep 3
            curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:3000/ || echo "Health check skipped"
            npx pm2 list
          ENDSSH
