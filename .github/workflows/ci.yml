name: CI/CD — Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Type Check
  # ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy (push via rsync — no server internet needed)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies + PM2
        run: |
          npm ci
          npm install pm2 --save-dev

      - name: Build (standalone mode)
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare deploy package
        run: |
          mkdir -p deploy_pkg

          # Next.js standalone output (self-contained server)
          cp -r .next/standalone/. deploy_pkg/
          cp -r .next/static deploy_pkg/.next/static
          cp -r public deploy_pkg/public

          # PM2 binary (copy from node_modules to server)
          mkdir -p deploy_pkg/pm2_bin
          cp -r node_modules/pm2 deploy_pkg/pm2_bin/pm2

          # .env.local
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > deploy_pkg/.env.local

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          DEPLOY_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/cwprdgen.agentwhistle.cloud"
          rsync -avz --delete \
            --no-times \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy_pkg/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_DIR}/ || true

      - name: Start / Restart with PM2
        run: |
          DEPLOY_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/cwprdgen.agentwhistle.cloud"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
              DEPLOY_DIR="$HOME/htdocs/cwprdgen.agentwhistle.cloud"
              PM2="$DEPLOY_DIR/pm2_bin/pm2/bin/pm2"
              cd $DEPLOY_DIR

              # Start or restart
              if $PM2 describe plancraft > /dev/null 2>&1; then
                $PM2 restart plancraft
              else
                PORT=3000 $PM2 start server.js --name plancraft
              fi

              $PM2 save
              echo "✅ Deploy complete on port 3000"
          ENDSSH
