name: CI/CD — Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Type Check
  # ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy (push via rsync — no server internet needed)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone mode)
        run: npm run build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Prepare deploy package
        run: |
          mkdir -p deploy_pkg

          # Next.js standalone output (self-contained server)
          cp -r .next/standalone/. deploy_pkg/
          cp -r .next/static deploy_pkg/.next/static
          cp -r public deploy_pkg/public

          # .env.local
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > deploy_pkg/.env.local

          # Startup script (nohup-based — no PM2 needed)
          cat > deploy_pkg/start.sh << 'STARTSCRIPT'
#!/bin/bash
DEPLOY_DIR="$(cd "$(dirname "$0")" && pwd)"
LOG="$HOME/plancraft.log"
PID_FILE="$HOME/plancraft.pid"

# Kill existing process
if [ -f "$PID_FILE" ]; then
  OLD_PID=$(cat "$PID_FILE")
  kill "$OLD_PID" 2>/dev/null && echo "Stopped old process $OLD_PID" || true
  rm -f "$PID_FILE"
fi

# Also kill any orphaned node server.js
pkill -f "node server.js" 2>/dev/null || true
sleep 1

# Start fresh
cd "$DEPLOY_DIR"
PORT=3000 nohup node server.js > "$LOG" 2>&1 &
echo $! > "$PID_FILE"
sleep 2

if kill -0 $(cat "$PID_FILE") 2>/dev/null; then
  echo "✅ PlanCraft running on port 3000 (PID: $(cat $PID_FILE))"
else
  echo "❌ Failed to start. Last 20 lines of log:"
  tail -20 "$LOG"
  exit 1
fi
STARTSCRIPT
          chmod +x deploy_pkg/start.sh

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          DEPLOY_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/cwprdgen.agentwhistle.cloud"
          rsync -avz --delete \
            --no-times \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy_pkg/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_DIR}/ || true

      - name: Start app via nohup
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash << 'ENDSSH'
              set -e
              DEPLOY_DIR="$HOME/htdocs/cwprdgen.agentwhistle.cloud"
              echo "Node: $(node --version)"
              bash "$DEPLOY_DIR/start.sh"
          ENDSSH
